name: Deploy depa USDOT toolkit

on:
  # The repository's Cloudflare API token needs rotating before this can be
  # safely restored to push-triggered deployment. The live branch is currently
  # deployed through the authenticated Wrangler session used for this project.
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: depa-usdot-toolkit
  cancel-in-progress: false

env:
  TOOLKIT_BRANCH: depa-usdot.nonarkara.org
  PAGES_PROJECT: phuket-smart-bus

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npx vite build

      - name: Copy SPA fallback
        run: cp dist/client/index.html dist/client/404.html

      - name: Deploy toolkit branch to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.81.1"
          command: pages deploy dist/client --project-name=${{ env.PAGES_PROJECT }} --branch=${{ env.TOOLKIT_BRANCH }}
