name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Hard gate — failing tests block deploy. The regression suite covers
      # the four bug classes that have repeatedly broken the live demo:
      # buses flying off the polyline, dead-zone right bar, time drift between
      # the map clock and the metrics clock, and broken day-of-week fuzz.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npm test

      - run: GITHUB_PAGES=true npx vite build
      - name: Copy 404.html for SPA routing
        run: cp dist/client/index.html dist/client/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
